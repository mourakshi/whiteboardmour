<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Whiteboardmour</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { overflow: hidden; background: #f5f5f3; font-family: sans-serif; }

      .toolbar {
        position: fixed; top: 0; left: 0; right: 0; height: 52px;
        background: white;
        border-bottom: 1px solid #e5e5e3;
        display: flex; align-items: center; padding: 0 16px; gap: 6px;
        z-index: 100;
      }

      .logo {
        font-size: 15px; font-weight: 600; color: #1a1a1a;
        margin-right: 12px; letter-spacing: -0.3px;
      }

      .divider {
        width: 1px; height: 24px; background: #e5e5e3; margin: 0 6px;
      }

      .tool-btn {
        width: 36px; height: 36px;
        border: 1px solid transparent;
        background: transparent;
        border-radius: 8px;
        cursor: pointer;
        display: flex; align-items: center; justify-content: center;
        font-size: 16px;
        color: #555;
        transition: background 0.15s, border-color 0.15s, color 0.15s;
        position: relative;
      }
      .tool-btn:hover { background: #f0f0ee; color: #111; }
      .tool-btn.active {
        background: #ededfc;
        border-color: #7c6ff7;
        color: #5b4ef5;
      }
      .tool-btn[title]:hover::after {
        content: attr(title);
        position: absolute; top: 42px; left: 50%; transform: translateX(-50%);
        background: #1a1a1a; color: white;
        font-size: 11px; padding: 3px 7px; border-radius: 4px;
        white-space: nowrap; pointer-events: none; z-index: 200;
      }

      .color-wrap {
        position: relative; width: 36px; height: 36px;
        border-radius: 8px; border: 1px solid #e5e5e3;
        overflow: hidden; cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
      .color-wrap input[type="color"] {
        position: absolute; width: 200%; height: 200%;
        top: -50%; left: -50%; border: none; cursor: pointer; opacity: 0;
      }
      .color-swatch {
        width: 20px; height: 20px; border-radius: 50%;
        border: 1.5px solid rgba(0,0,0,0.15);
        background: #000; pointer-events: none;
      }

      .stroke-select {
        height: 36px; padding: 0 8px;
        border: 1px solid #e5e5e3; border-radius: 8px;
        font-size: 13px; color: #333; background: white;
        cursor: pointer; outline: none;
      }

      .users-badge {
        margin-left: auto;
        background: #f0fdf4; border: 1px solid #bbf7d0;
        color: #16a34a; font-size: 12px; font-weight: 500;
        padding: 4px 10px; border-radius: 20px;
        display: flex; align-items: center; gap: 5px;
      }
      .users-dot {
        width: 6px; height: 6px; border-radius: 50%; background: #22c55e;
      }

      .rooms-btn {
        height: 34px; padding: 0 14px;
        background: #5b4ef5; color: white;
        border: none; border-radius: 8px;
        font-size: 13px; font-weight: 500;
        cursor: pointer; transition: background 0.15s;
        margin-left: 6px;
      }
      .rooms-btn:hover { background: #4a3fe0; }

      canvas { display: block; margin-top: 52px; cursor: crosshair; }

      .room-banner {
        position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
        background: white; border: 1px solid #e5e5e3;
        border-radius: 10px; padding: 8px 16px;
        font-size: 13px; color: #555;
        display: flex; align-items: center; gap: 8px;
      }
      .room-banner span { font-weight: 500; color: #111; }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <div class="logo">Whiteboardmour</div>
      <div class="divider"></div>

      <button class="tool-btn" id="pencil" title="Pencil">✏️</button>
      <button class="tool-btn" id="brush" title="Brush">🖌️</button>
      <button class="tool-btn" id="rectangle" title="Rectangle">▭</button>
      <button class="tool-btn" id="text" title="Text">T</button>
      <button class="tool-btn" id="fill" title="Fill bucket">🪣</button>
      <button class="tool-btn" id="eraser" title="Eraser">◻</button>

      <div class="divider"></div>

      <div class="color-wrap" title="Color">
        <div class="color-swatch" id="colorSwatch"></div>
        <input type="color" id="colorPicker" value="#000000" />
      </div>

      <select class="stroke-select" id="strokeWidth">
        <option value="1">Thin</option>
        <option value="2" selected>Normal</option>
        <option value="4">Thick</option>
        <option value="8">Heavy</option>
      </select>

      <div class="divider"></div>

      <button class="tool-btn" id="clearBtn" title="Clear canvas">🗑️</button>

      <div class="users-badge">
        <div class="users-dot"></div>
        <span id="users">0 online</span>
      </div>

      <button class="rooms-btn" onclick="window.location.href='/rooms.html'">Rooms</button>
    </div>

    <div class="room-banner" id="roomBanner" style="display:none">
      Room: <span id="roomLabel">—</span>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
