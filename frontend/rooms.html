<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rooms - Whiteboardmour</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="p-6">
    <h1 class="text-2xl font-bold mb-4">Rooms</h1>
    <div class="border border-blue-500 rounded p-4 mb-4">
      <input
        id="name"
        type="text"
        placeholder="Room name"
        class="w-full px-3 py-2 bg-blue-100 rounded mb-3"
      />
      <button
        id="create_btn"
        class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-700"
      >
        Create Room
      </button>
    </div>
    <div id="rooms" hidden class="border border-blue-500 rounded p-4"></div>
    <script type="module" src="/src/rooms.ts"></script>
  </body>
</html>
